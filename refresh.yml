<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Events Radar — Disputes, Investigations & Financial Crime</title>
<style>
  :root {
    --bg: #faf9f7;
    --panel: #ffffff;
    --ink: #1a1f2e;
    --ink-soft: #5a6478;
    --ink-mute: #8a94a8;
    --line: #e5e2dc;
    --line-soft: #f0ede6;
    --accent: #7c3a1d;
    --accent-soft: #f4ebe3;
    --teal: #2d5f5d;
    --teal-soft: #e1ede9;
    --gold: #a07925;
    --gold-soft: #f5eedb;
    --red: #8b2e2e;
    --red-soft: #f3e3e1;
    --shadow-sm: 0 1px 2px rgba(26,31,46,0.04);
    --shadow: 0 1px 2px rgba(26,31,46,0.04), 0 4px 12px rgba(26,31,46,0.04);
    --shadow-lg: 0 4px 24px rgba(26,31,46,0.12), 0 16px 48px rgba(26,31,46,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ APP SHELL ============ */
  .app {
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    max-width: 1440px;
    margin: 0 auto;
    background: var(--panel);
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
  }

  /* ============ TOP BAR ============ */
  .topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 28px; height: 28px;
    background: var(--ink);
    border-radius: 6px;
    position: relative;
    flex-shrink: 0;
  }
  .brand-mark::before, .brand-mark::after {
    content: "";
    position: absolute;
    background: var(--gold);
  }
  .brand-mark::before { top: 7px; left: 7px; width: 14px; height: 2px; }
  .brand-mark::after { top: 7px; left: 7px; width: 2px; height: 14px; }
  .brand-mark span {
    position: absolute; top: 13px; left: 13px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--panel);
    display: block;
  }
  .brand-name {
    font-family: Georgia, serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--ink-mute);
    margin-left: 8px;
  }
  .nav-tabs {
    display: flex;
    gap: 2px;
    margin-left: 16px;
  }
  .nav-tab {
    padding: 7px 14px;
    font-size: 12.5px;
    color: var(--ink-soft);
    background: none;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: background 0.12s;
  }
  .nav-tab:hover { background: var(--line-soft); }
  .nav-tab.active {
    background: var(--ink);
    color: var(--panel);
  }
  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .refresh-indicator {
    font-size: 11px;
    color: var(--ink-mute);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .refresh-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--teal);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .btn {
    padding: 7px 12px;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .btn:hover { border-color: var(--ink-mute); background: #fcfbf7; }
  .btn-primary {
    background: var(--ink);
    color: var(--panel);
    border-color: var(--ink);
  }
  .btn-primary:hover { background: #2a3141; border-color: #2a3141; }

  /* ============ PAGE HEADER ============ */
  .page-header {
    padding: 22px 28px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 20px;
  }
  .page-title {
    font-family: Georgia, serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.015em;
    margin-bottom: 4px;
  }
  .page-sub {
    color: var(--ink-soft);
    font-size: 12.5px;
  }
  .view-toggle {
    display: flex;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .view-toggle button {
    padding: 7px 14px;
    font-size: 12px;
    font-family: inherit;
    background: var(--panel);
    border: none;
    border-right: 1px solid var(--line);
    color: var(--ink-soft);
    cursor: pointer;
    font-weight: 500;
  }
  .view-toggle button:last-child { border-right: none; }
  .view-toggle button.active {
    background: var(--ink);
    color: var(--panel);
  }

  /* ============ KPI STRIP ============ */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-bottom: 1px solid var(--line);
  }
  .kpi {
    padding: 16px 22px;
    border-right: 1px solid var(--line-soft);
  }
  .kpi:last-child { border-right: none; }
  .kpi-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--ink-mute);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .kpi-value {
    font-family: Georgia, serif;
    font-size: 26px;
    font-weight: 600;
    line-height: 1;
  }
  .kpi-sub {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 5px;
  }

  /* ============ MAIN LAYOUT ============ */
  .main {
    display: grid;
    grid-template-columns: 240px 1fr 320px;
    min-height: 640px;
  }

  /* ============ FILTERS ============ */
  .filters {
    border-right: 1px solid var(--line);
    padding: 20px;
    background: #fbfaf6;
    overflow-y: auto;
    max-height: calc(100vh - 200px);
  }
  .filter-group { margin-bottom: 22px; }
  .filter-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--ink-mute);
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .clear-btn {
    font-size: 10px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 500;
    padding: 0;
  }
  .clear-btn:hover { text-decoration: underline; }
  .clear-btn:disabled { color: var(--ink-mute); cursor: default; text-decoration: none; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    font-size: 11.5px;
    padding: 5px 11px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: var(--panel);
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.12s;
    user-select: none;
    font-family: inherit;
  }
  .chip:hover { border-color: var(--ink-mute); color: var(--ink); }
  .chip.on {
    background: var(--ink);
    color: var(--panel);
    border-color: var(--ink);
  }
  .chip-count {
    margin-left: 4px;
    color: var(--ink-mute);
    font-variant-numeric: tabular-nums;
  }
  .chip.on .chip-count { color: rgba(255,255,255,0.5); }
  .search-wrap { position: relative; }
  .search-box {
    width: 100%;
    padding: 8px 12px 8px 30px;
    border: 1px solid var(--line);
    border-radius: 5px;
    font-size: 12.5px;
    font-family: inherit;
    background: var(--panel);
    color: var(--ink);
  }
  .search-box:focus { outline: none; border-color: var(--ink); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 12px;
    border: 1.5px solid var(--ink-mute);
    border-radius: 50%;
    pointer-events: none;
  }
  .search-icon::after {
    content: ""; position: absolute;
    right: -5px; bottom: -3px;
    width: 5px; height: 1.5px;
    background: var(--ink-mute);
    transform: rotate(45deg);
    transform-origin: left;
  }
  .date-range { display: flex; gap: 6px; }
  .date-range input {
    flex: 1;
    padding: 6px 8px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 11.5px;
    font-family: inherit;
    color: var(--ink);
  }

  /* ============ CONTENT ============ */
  .content {
    padding: 20px 26px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .content-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .content-head h2 {
    font-family: Georgia, serif;
    font-size: 16px;
    font-weight: 600;
  }
  .content-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .result-count {
    font-size: 11.5px;
    color: var(--ink-mute);
  }
  .sort-select {
    font-size: 11.5px;
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--panel);
    font-family: inherit;
    color: var(--ink);
    cursor: pointer;
  }

  /* List view */
  .event-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--line-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .event {
    background: var(--panel);
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 64px 1fr auto;
    gap: 14px;
    align-items: start;
    cursor: pointer;
    transition: background 0.1s;
    border: none;
    text-align: left;
    font-family: inherit;
    color: inherit;
    width: 100%;
  }
  .event:hover { background: #fcfbf7; }
  .event-date {
    font-family: Georgia, serif;
    text-align: center;
    padding-top: 2px;
  }
  .event-date .month {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 600;
  }
  .event-date .day {
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
    margin-top: 2px;
  }
  .event-date .range {
    font-size: 10px;
    color: var(--ink-mute);
    margin-top: 2px;
  }
  .event-body { min-width: 0; }
  .event-body .title {
    font-weight: 600;
    font-size: 13.5px;
    line-height: 1.35;
    margin-bottom: 3px;
    color: var(--ink);
  }
  .event-body .meta {
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .event-body .meta .sep { color: var(--ink-mute); margin: 0 6px; }
  .event-body .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 10.5px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
  }
  .tag.topic { background: var(--line-soft); color: var(--ink-soft); }
  .tag.format-v { background: var(--teal-soft); color: var(--teal); }
  .tag.format-i { background: var(--accent-soft); color: var(--accent); }
  .tag.format-h { background: var(--gold-soft); color: var(--gold); }
  .tag.cost-f { background: var(--teal-soft); color: var(--teal); }
  .tag.cost-p { background: var(--line-soft); color: var(--ink-soft); }
  .tag.new { background: var(--red-soft); color: var(--red); }
  .tag.flag { background: var(--gold-soft); color: var(--gold); font-weight: 600; }
  .event-side {
    font-size: 11px;
    color: var(--ink-soft);
    text-align: right;
    white-space: nowrap;
    padding-top: 2px;
  }
  .event-side .cost-amt { font-weight: 600; color: var(--ink); display: block; font-size: 12px; }
  .event-side .days-away { margin-top: 3px; color: var(--ink-mute); }

  /* Calendar view */
  .calendar {
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .cal-months { display: flex; flex-direction: column; }
  .cal-month {
    border-bottom: 1px solid var(--line);
  }
  .cal-month:last-child { border-bottom: none; }
  .cal-month-header {
    background: #fbfaf6;
    padding: 10px 16px;
    font-family: Georgia, serif;
    font-weight: 600;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid var(--line-soft);
  }
  .cal-month-count { color: var(--ink-mute); font-size: 11px; font-family: Inter, sans-serif; font-weight: 500; }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--line-soft);
    padding: 0;
  }
  .cal-dow {
    background: var(--panel);
    padding: 6px 4px;
    font-size: 10px;
    text-align: center;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .cal-cell {
    background: var(--panel);
    min-height: 68px;
    padding: 4px 5px;
    font-size: 10.5px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    cursor: default;
  }
  .cal-cell.other { background: #fbfaf6; color: var(--ink-mute); }
  .cal-cell.today { background: var(--gold-soft); }
  .cal-cell-num { font-weight: 500; color: var(--ink-soft); }
  .cal-cell.today .cal-cell-num { color: var(--gold); font-weight: 700; }
  .cal-event {
    background: var(--accent);
    color: white;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 9.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    line-height: 1.3;
  }
  .cal-event:hover { opacity: 0.88; }
  .cal-event.virtual { background: var(--teal); }
  .cal-event.hybrid { background: var(--gold); }
  .cal-event.flagship { background: var(--ink); font-weight: 600; }
  .cal-more {
    font-size: 9.5px;
    color: var(--ink-mute);
    padding: 1px 4px;
  }

  /* ============ SIDE PANEL ============ */
  .side {
    border-left: 1px solid var(--line);
    padding: 20px;
    background: #fbfaf6;
    overflow-y: auto;
    max-height: calc(100vh - 200px);
  }
  .side-section { margin-bottom: 24px; }
  .side-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--ink-mute);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .bar-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: baseline;
    margin-bottom: 8px;
    cursor: pointer;
    padding: 3px 0;
    border-radius: 3px;
    transition: background 0.1s;
  }
  .bar-item:hover { background: var(--line-soft); padding-left: 6px; padding-right: 6px; }
  .bar-item .name {
    font-size: 11.5px;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bar-item .count {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .bar-item .bar {
    grid-column: 1 / -1;
    height: 4px;
    background: var(--line);
    border-radius: 100px;
    overflow: hidden;
    margin-top: 3px;
  }
  .bar-item .fill {
    height: 100%;
    background: var(--ink);
    border-radius: 100px;
    transition: width 0.3s;
  }
  .digest-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 12px 14px;
    border-radius: 4px;
    font-size: 11.5px;
  }
  .digest-card .ttl { font-weight: 600; font-size: 12.5px; margin-bottom: 8px; }
  .digest-card .date { color: var(--ink-mute); font-size: 10.5px; margin-bottom: 10px; }
  .digest-item {
    display: flex;
    gap: 10px;
    padding: 5px 0;
    border-top: 1px dotted var(--line);
    align-items: baseline;
  }
  .digest-item:first-of-type { border-top: none; padding-top: 2px; }
  .digest-n {
    font-family: Georgia, serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
    min-width: 24px;
  }
  .digest-label { color: var(--ink-soft); font-size: 11.5px; line-height: 1.4; }

  /* ============ MODAL ============ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(26,31,46,0.5);
    display: none;
    z-index: 100;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .modal-backdrop.open { display: flex; justify-content: center; align-items: flex-start; }
  .modal {
    background: var(--panel);
    border-radius: 8px;
    max-width: 600px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  .modal-head {
    padding: 22px 26px 18px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 18px; right: 18px;
    width: 28px; height: 28px;
    border: none;
    background: var(--line-soft);
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { background: var(--line); }
  .modal-organiser {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .modal-title {
    font-family: Georgia, serif;
    font-size: 20px;
    font-weight: 600;
    line-height: 1.25;
    padding-right: 40px;
    margin-bottom: 12px;
  }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .modal-body {
    padding: 20px 26px;
  }
  .modal-grid {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 10px 16px;
    font-size: 12.5px;
  }
  .modal-grid dt {
    color: var(--ink-mute);
    font-weight: 500;
  }
  .modal-grid dd {
    color: var(--ink);
  }
  .modal-grid dd a { color: var(--accent); text-decoration: none; word-break: break-all; }
  .modal-grid dd a:hover { text-decoration: underline; }
  .modal-foot {
    padding: 16px 26px;
    background: #fbfaf6;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .modal-meta {
    font-size: 11px;
    color: var(--ink-mute);
  }
  .modal-actions { display: flex; gap: 8px; }

  /* ============ EMPTY / TOAST ============ */
  .empty {
    background: var(--panel);
    padding: 48px 20px;
    text-align: center;
    color: var(--ink-mute);
    font-size: 13px;
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  .empty strong { color: var(--ink); display: block; margin-bottom: 4px; font-size: 14px; }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--panel);
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 500;
    box-shadow: var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 200;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 1200px) {
    .main { grid-template-columns: 220px 1fr; }
    .side { display: none; }
    .kpi-row { grid-template-columns: repeat(4, 1fr); }
    .kpi:nth-child(5) { display: none; }
  }
  @media (max-width: 860px) {
    .main { grid-template-columns: 1fr; }
    .filters { display: none; }
    .filters.open { display: block; position: fixed; inset: 0; z-index: 50; background: var(--panel); max-height: none; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .kpi:nth-child(4), .kpi:nth-child(5) { display: none; }
    .topbar { padding: 12px 16px; flex-wrap: wrap; }
    .page-header, .content { padding-left: 16px; padding-right: 16px; }
    .nav-tabs .nav-tab:not(.active) { display: none; }
  }

  /* ============ FOOTER ============ */
  .footer {
    padding: 14px 28px;
    border-top: 1px solid var(--line);
    font-size: 11px;
    color: var(--ink-mute);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .footer a {
    color: var(--ink-soft);
    text-decoration: none;
  }
  .footer a:hover { color: var(--accent); text-decoration: underline; }
</style>
</head>
<body>
<div class="app">

  <!-- ========== TOP BAR ========== -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"><span></span></div>
      <div>
        <div class="brand-name">Events Radar</div>
      </div>
      <div class="brand-sub">Disputes · Investigations · Financial Crime</div>
    </div>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-page="events">Events</button>
      <button class="nav-tab" data-page="calendar">Calendar</button>
      <button class="nav-tab" data-page="sources">Sources</button>
      <button class="nav-tab" data-page="about">About</button>
    </nav>
    <div class="topbar-right">
      <div class="refresh-indicator">
        <span class="refresh-dot"></span>
        <span id="refresh-time">Loading…</span>
      </div>
      <button class="btn" id="export-btn">Export CSV</button>
      <button class="btn btn-primary" id="subscribe-btn">Get digest</button>
    </div>
  </header>

  <!-- ========== PAGE HEADER ========== -->
  <div class="page-header">
    <div>
      <h1 class="page-title" id="page-title">Upcoming events</h1>
      <div class="page-sub" id="page-sub">Real events from 12 sources. Click any event to view full details.</div>
    </div>
    <div class="view-toggle" id="view-toggle">
      <button class="active" data-view="list">List</button>
      <button data-view="calendar">Calendar</button>
    </div>
  </div>

  <!-- ========== KPI ROW ========== -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- ========== MAIN ========== -->
  <div class="main">

    <!-- FILTERS -->
    <aside class="filters" id="filters">
      <div class="filter-group">
        <div class="filter-label">Search</div>
        <div class="search-wrap">
          <span class="search-icon"></span>
          <input class="search-box" id="search" type="text" placeholder="Title, organiser, city...">
        </div>
      </div>
      <div class="filter-group">
        <div class="filter-label">
          <span>Format</span>
          <button class="clear-btn" data-clear="format">clear</button>
        </div>
        <div class="chips" data-group="format" id="chips-format"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">
          <span>Topic</span>
          <button class="clear-btn" data-clear="topic">clear</button>
        </div>
        <div class="chips" data-group="topic" id="chips-topic"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">
          <span>Region</span>
          <button class="clear-btn" data-clear="region">clear</button>
        </div>
        <div class="chips" data-group="region" id="chips-region"></div>
