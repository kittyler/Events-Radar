        <button class="btn" id="m-ics">Add to calendar</button>
        <a class="btn btn-primary" id="m-register" target="_blank" rel="noopener">Register ↗</a>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   EVENTS DATA — real events, real URLs, verified on source sites
   ============================================================ */
let EVENTS = []; // populated from events.json at runtime

const SOURCES = [
  { name: "Global Investigations Review", url: "https://globalinvestigationsreview.com/events", method: "Scrape", schedule: "Daily 06:00" },
  { name: "ACAMS", url: "https://www.acams.org/en/events", method: "Scrape + RSS", schedule: "Daily 06:00" },
  { name: "LCIA", url: "https://www.lcia.org", method: "Scrape", schedule: "Daily 06:00" },
  { name: "LIDW", url: "https://register.lidw.co.uk/", method: "Scrape", schedule: "Daily 06:00" },
  { name: "C5 Group / Informa", url: "https://www.c5-online.com", method: "Scrape", schedule: "Daily 06:00" },
  { name: "American Conference Institute", url: "https://www.americanconference.com", method: "Scrape", schedule: "Daily 06:00" },
  { name: "Jesus College Cambridge (CIDOEC)", url: "https://www.crimesymposium.org", method: "Scrape", schedule: "Weekly" },
  { name: "RUSI Centre for Finance & Security", url: "https://www.rusi.org", method: "Scrape + RSS", schedule: "Daily 06:00" },
  { name: "International Chamber of Commerce", url: "https://iccwbo.org", method: "Scrape", schedule: "Weekly" },
  { name: "IAC London Arbitration Calendar", url: "https://www.iac-london.com/arbitral-events-2026/", method: "Scrape", schedule: "Weekly" },
  { name: "Herbert Smith Freehills", url: "https://www.hsfkramer.com/events", method: "RSS", schedule: "Daily 06:00" },
  { name: "Gibson Dunn Webcasts", url: "https://www.gibsondunn.com/events/", method: "Scrape", schedule: "Daily 06:00" }
];

/* ============================================================
   STATE
   ============================================================ */
const TODAY = new Date(new Date().toISOString().slice(0,10) + "T00:00:00");
const state = {
  page: "events",
  view: "list",
  format: new Set(),
  topic: new Set(),
  region: new Set(),
  cost: new Set(),
  search: "",
  dateFrom: "",
  dateTo: "",
  sort: "date"
};

/* ============================================================
   HELPERS
   ============================================================ */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));

function parseDate(iso) { return new Date(iso + "T00:00:00"); }
function fmtDate(iso) {
  const d = parseDate(iso);
  return {
    month: d.toLocaleString("en-GB", { month: "short" }),
    day: d.getDate(),
    weekday: d.toLocaleString("en-GB", { weekday: "short" }),
    full: d.toLocaleString("en-GB", { day: "numeric", month: "long", year: "numeric" })
  };
}
function daysFromToday(iso) {
  const d = parseDate(iso);
  return Math.round((d - TODAY) / 86400000);
}
function daysAwayLabel(n) {
  if (n < 0) return `${-n}d ago`;
  if (n === 0) return "Today";
  if (n === 1) return "Tomorrow";
  if (n < 7) return `In ${n}d`;
  if (n < 30) return `In ${Math.round(n/7)}w`;
  return `In ${Math.round(n/30)}mo`;
}
function toast(msg) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 2400);
}

/* ============================================================
   FILTER LOGIC
   ============================================================ */
function applyFilters(list) {
  let out = list.filter(e => parseDate(e.end) >= TODAY); // default: only upcoming

  if (state.format.size) out = out.filter(e => state.format.has(e.format));
  if (state.region.size) out = out.filter(e => state.region.has(e.region));
  if (state.cost.size)   out = out.filter(e => state.cost.has(e.cost));
  if (state.topic.size)  out = out.filter(e => e.topics.some(t => state.topic.has(t)));

  if (state.dateFrom) out = out.filter(e => e.end >= state.dateFrom);
  if (state.dateTo)   out = out.filter(e => e.start <= state.dateTo);

  if (state.search) {
    const q = state.search.toLowerCase();
    out = out.filter(e =>
      e.title.toLowerCase().includes(q) ||
      e.organiser.toLowerCase().includes(q) ||
      e.city.toLowerCase().includes(q) ||
      (e.country || "").toLowerCase().includes(q) ||
      e.topics.join(" ").toLowerCase().includes(q)
    );
  }

  // Sort
  if (state.sort === "date")      out.sort((a,b) => a.start.localeCompare(b.start));
  else if (state.sort === "date-desc") out.sort((a,b) => b.start.localeCompare(a.start));
  else if (state.sort === "cost") out.sort((a,b) => (a.cost === "Free" ? 0 : 1) - (b.cost === "Free" ? 0 : 1) || a.start.localeCompare(b.start));
  else if (state.sort === "org")  out.sort((a,b) => a.organiser.localeCompare(b.organiser));
  else if (state.sort === "region") out.sort((a,b) => a.region.localeCompare(b.region) || a.start.localeCompare(b.start));

  return out;
}

/* ============================================================
   RENDER: KPIs
   ============================================================ */
function renderKPIs() {
  const upcoming = EVENTS.filter(e => parseDate(e.end) >= TODAY);
  const in30 = new Date(TODAY); in30.setDate(TODAY.getDate() + 30);
  const next30 = upcoming.filter(e => parseDate(e.start) <= in30);
  const virtual = upcoming.filter(e => e.format === "Virtual").length;
  const inPerson30 = next30.filter(e => e.format === "In-person").length;
  const ukEvents = upcoming.filter(e => e.region === "UK" && e.format === "In-person").length;
  const flagship = upcoming.filter(e => e.flags.includes("Flagship")).length;
  const free = upcoming.filter(e => e.cost === "Free").length;

  $("#kpi-row").innerHTML = `
    <div class="kpi"><div class="kpi-label">Upcoming events</div><div class="kpi-value">${upcoming.length}</div><div class="kpi-sub">Across 12 sources</div></div>
    <div class="kpi"><div class="kpi-label">Next 30 days</div><div class="kpi-value">${next30.length}</div><div class="kpi-sub">${inPerson30} in-person · ${next30.length - inPerson30} other</div></div>
    <div class="kpi"><div class="kpi-label">Flagship events</div><div class="kpi-value">${flagship}</div><div class="kpi-sub">Marquee dates</div></div>
    <div class="kpi"><div class="kpi-label">Free events</div><div class="kpi-value">${free}</div><div class="kpi-sub">No ticket cost</div></div>
    <div class="kpi"><div class="kpi-label">UK in-person</div><div class="kpi-value">${ukEvents}</div><div class="kpi-sub">London &amp; Cambridge</div></div>
  `;
  $("#footer-count").textContent = EVENTS.length;
}

/* ============================================================
   RENDER: FILTER CHIPS (with counts)
   ============================================================ */
function renderChips() {
  const upcoming = EVENTS.filter(e => parseDate(e.end) >= TODAY);

  const groups = {
    format: [...new Set(upcoming.map(e => e.format))].sort(),
    region: [...new Set(upcoming.map(e => e.region))].sort(),
    cost: [...new Set(upcoming.map(e => e.cost))].sort(),
    topic: [...new Set(upcoming.flatMap(e => e.topics))].sort()
  };

  for (const [group, values] of Object.entries(groups)) {
    const container = $("#chips-" + group);
    const selected = state[group];
    container.innerHTML = values.map(v => {
      let count;
      if (group === "topic") count = upcoming.filter(e => e.topics.includes(v)).length;
      else count = upcoming.filter(e => e[group] === v).length;
      const on = selected.has(v) ? " on" : "";
      return `<button class="chip${on}" data-val="${v}">${v}<span class="chip-count">${count}</span></button>`;
    }).join("");
  }

  // Enable/disable clear buttons
  $$("[data-clear]").forEach(btn => {
    const g = btn.dataset.clear;
    let has;
    if (g === "dates") has = state.dateFrom || state.dateTo;
    else has = state[g] && state[g].size > 0;
    btn.disabled = !has;
  });
}

/* ============================================================
   RENDER: EVENT LIST
   ============================================================ */
function renderList(list) {
  const container = $("#view-container");
  if (list.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <strong>No events match these filters</strong>
        Try clearing a filter or searching a different term.
      </div>`;
    return;
  }

  const html = `<div class="event-list">` + list.map(e => {
    const d = fmtDate(e.start);
    const multi = e.start !== e.end;
    const endD = multi ? fmtDate(e.end) : null;
    const rangeStr = multi
      ? (e.start.slice(0,7) === e.end.slice(0,7) ? `→ ${endD.day}` : `→ ${endD.month} ${endD.day}`)
      : d.weekday;
    const formatCls = e.format === "Virtual" ? "format-v" : e.format === "In-person" ? "format-i" : "format-h";
    const costCls = e.cost === "Free" ? "cost-f" : "cost-p";
    const daysAway = daysFromToday(e.start);

    const tags = [
      `<span class="tag ${formatCls}">${e.format}</span>`,
      `<span class="tag ${costCls}">${e.cost}</span>`,
      ...e.topics.slice(0, 3).map(t => `<span class="tag topic">${t}</span>`),
      ...e.flags.map(f => `<span class="tag flag">${f}</span>`)
    ].join("");

    return `<button class="event" data-id="${e.id}">
      <div class="event-date">
        <div class="month">${d.month}</div>
        <div class="day">${d.day}</div>
        <div class="range">${rangeStr}</div>
      </div>
      <div class="event-body">
        <div class="title">${e.title}</div>
        <div class="meta">${e.organiser}<span class="sep">·</span>${e.city}${e.country ? ', ' + e.country : ''}</div>
        <div class="tags">${tags}</div>
      </div>
      <div class="event-side">
        <span class="cost-amt">${e.costDisplay}</span>
        <span class="days-away">${daysAwayLabel(daysAway)}</span>
      </div>
    </button>`;
  }).join("") + `</div>`;

  container.innerHTML = html;
}

/* ============================================================
   RENDER: CALENDAR
   ============================================================ */
function renderCalendar(list) {
  const container = $("#view-container");
  if (list.length === 0) {
    container.innerHTML = `<div class="empty"><strong>No events to show</strong>Try clearing filters.</div>`;
    return;
  }

  // Group by month
  const byMonth = {};
  list.forEach(e => {
    // An event spans from start to end; add it to every month it touches
    let cur = parseDate(e.start);
    const end = parseDate(e.end);
    while (cur <= end) {
      const key = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`;
      (byMonth[key] = byMonth[key] || []).push({ ev: e, date: cur.toISOString().slice(0,10) });
      cur.setDate(cur.getDate() + 1);
    }
  });

  const monthKeys = Object.keys(byMonth).sort();
  const dowLabels = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const todayStr = TODAY.toISOString().slice(0,10);

  const months = monthKeys.map(key => {
    const [y, m] = key.split("-").map(Number);
    const monthStart = new Date(y, m-1, 1);
    const monthName = monthStart.toLocaleString("en-GB", { month: "long", year: "numeric" });
    // Get first Monday on or before the 1st
    const firstDayDow = (monthStart.getDay() + 6) % 7; // 0 = Monday
    const gridStart = new Date(monthStart);
    gridStart.setDate(1 - firstDayDow);

    // Count unique events in this month
    const uniqueIds = new Set(byMonth[key].map(x => x.ev.id));

    // Build cells
    const cells = [];
    for (let i = 0; i < 42; i++) {
      const d = new Date(gridStart);
      d.setDate(gridStart.getDate() + i);
      const iso = d.toISOString().slice(0,10);
      const inMonth = d.getMonth() === m-1;
      const isToday = iso === todayStr;
      const dayEvents = byMonth[key].filter(x => x.date === iso).map(x => x.ev);
      // Dedupe (an event covering multi days could be listed once per day in byMonth)
      const seen = new Set();
      const unique = dayEvents.filter(e => seen.has(e.id) ? false : seen.add(e.id));

      const shown = unique.slice(0, 2);
      const more = unique.length - shown.length;

      cells.push(`<div class="cal-cell${inMonth ? "" : " other"}${isToday ? " today" : ""}">
        <div class="cal-cell-num">${d.getDate()}</div>
        ${shown.map(e => {
          const cls = e.flags.includes("Flagship") ? "flagship"
                    : e.format === "Virtual" ? "virtual"
                    : e.format === "Hybrid" ? "hybrid" : "";
          return `<div class="cal-event ${cls}" data-id="${e.id}" title="${e.title}">${e.title}</div>`;
        }).join("")}
        ${more > 0 ? `<div class="cal-more">+ ${more} more</div>` : ""}
      </div>`);
      if (!inMonth && d > new Date(y, m, 0) && i % 7 === 6) break; // stop early if past month
    }

    return `<div class="cal-month">
      <div class="cal-month-header">
        <span>${monthName}</span>
        <span class="cal-month-count">${uniqueIds.size} event${uniqueIds.size === 1 ? '' : 's'}</span>
      </div>
      <div class="cal-grid">
        ${dowLabels.map(l => `<div class="cal-dow">${l}</div>`).join("")}
        ${cells.join("")}
      </div>
    </div>`;
  }).join("");

  container.innerHTML = `<div class="calendar"><div class="cal-months">${months}</div></div>`;
}

/* ============================================================
   RENDER: SIDE PANEL
   ============================================================ */
function renderSide() {
  const upcoming = EVENTS.filter(e => parseDate(e.end) >= TODAY);
  const in90 = new Date(TODAY); in90.setDate(TODAY.getDate() + 90);
  const next90 = upcoming.filter(e => parseDate(e.start) <= in90);

  // Digest
  const weekEnd = new Date(TODAY); weekEnd.setDate(TODAY.getDate() + 7);
  const in30 = new Date(TODAY); in30.setDate(TODAY.getDate() + 30);
  const thisWeek = upcoming.filter(e => parseDate(e.start) <= weekEnd);
  const next30 = upcoming.filter(e => parseDate(e.start) <= in30);
  const free30 = next30.filter(e => e.cost === "Free").length;
  const flag30 = next30.filter(e => e.flags.includes("Flagship")).length;

  $("#digest-date").textContent = "Monday, 13 April 2026";
  $("#digest-list").innerHTML = `
    <div class="digest-item"><div class="digest-n">${thisWeek.length}</div><div class="digest-label">events this week</div></div>
    <div class="digest-item"><div class="digest-n">${next30.length}</div><div class="digest-label">events in next 30 days</div></div>
    <div class="digest-item"><div class="digest-n">${free30}</div><div class="digest-label">free events next 30 days</div></div>
    <div class="digest-item"><div class="digest-n">${flag30}</div><div class="digest-label">flagship events ahead</div></div>
  `;

  // Topics
  const topicCounts = {};
  next90.forEach(e => e.topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; }));
  const topTopics = Object.entries(topicCounts).sort((a,b) => b[1]-a[1]).slice(0,7);
  const maxTop = topTopics[0] ? topTopics[0][1] : 1;
  $("#topics-chart").innerHTML = topTopics.map(([n, c]) => `
    <div class="bar-item" data-topic="${n}">
      <span class="name">${n}</span>
      <span class="count">${c}</span>
      <div class="bar"><div class="fill" style="width: ${(c/maxTop*100).toFixed(0)}%;"></div></div>
    </div>`).join("");

  // Orgs
  const orgCounts = {};
  upcoming.forEach(e => { orgCounts[e.organiser] = (orgCounts[e.organiser] || 0) + 1; });
  const top = Object.entries(orgCounts).sort((a,b) => b[1]-a[1]).slice(0,6);
  const short = s => s.replace("Global Investigations Review","GIR")
    .replace("American Conference Institute","ACI")
    .replace("International Chamber of Commerce","ICC")
    .replace("LCIA Young International Arbitration Group","LCIA YIAG")
    .replace("RUSI Centre for Finance and Security","RUSI CFS")
    .replace("Jesus College, Cambridge (CIDOEC)","Cambridge CIDOEC");
  const maxOrg = top[0] ? top[0][1] : 1;
  $("#orgs-chart").innerHTML = top.map(([n, c]) => `
    <div class="bar-item">
      <span class="name" title="${n}">${short(n)}</span>
      <span class="count">${c}</span>
      <div class="bar"><div class="fill" style="width: ${(c/maxOrg*100).toFixed(0)}%;"></div></div>
    </div>`).join("");
}

/* ============================================================
   RENDER: SOURCES PAGE
   ============================================================ */
function renderSources() {
  const rows = SOURCES.map(s => `
    <tr style="border-top: 1px solid var(--line-soft);">
      <td style="padding: 10px 14px; font-weight: 500;">${s.name}</td>
      <td style="padding: 10px 14px;"><a href="${s.url}" target="_blank" rel="noopener" style="color: var(--accent); text-decoration: none;">${s.url}</a></td>
      <td style="padding: 10px 14px; color: var(--ink-soft);">${s.method}</td>
      <td style="padding: 10px 14px; color: var(--ink-soft);">${s.schedule}</td>
    </tr>`).join("");

  $("#view-container").innerHTML = `
    <div style="border: 1px solid var(--line); border-radius: 6px; overflow: hidden;">
      <table style="width: 100%; border-collapse: collapse; background: var(--panel); font-size: 12.5px;">
        <thead>
          <tr style="background: #fbfaf6;">
            <th style="padding: 10px 14px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-mute);">Source</th>
            <th style="padding: 10px 14px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-mute);">URL</th>
            <th style="padding: 10px 14px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-mute);">Method</th>
            <th style="padding: 10px 14px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-mute);">Schedule</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p style="margin-top: 16px; font-size: 12px; color: var(--ink-soft);">
      Each source is fetched on the listed schedule. Pages are passed through an LLM extractor that produces structured event records against a fixed schema. Events are deduplicated by title + date + city, then written to the database that powers this dashboard.
    </p>`;
}

/* ============================================================
   RENDER: ABOUT PAGE
   ============================================================ */
function renderAbout() {
  $("#view-container").innerHTML = `
    <div style="max-width: 680px; font-size: 13.5px; line-height: 1.7; color: var(--ink-soft);">
      <h3 style="font-family: Georgia, serif; font-size: 18px; color: var(--ink); margin-bottom: 12px;">About Events Radar</h3>
      <p style="margin-bottom: 16px;">Events Radar aggregates networking events, conferences, and webinars relevant to practitioners working on disputes, investigations, and financial crime. Every event listed here comes from its organiser's own website. Every registration link is live.</p>

      <h4 style="font-family: Georgia, serif; font-size: 14px; color: var(--ink); margin: 20px 0 8px;">How it works</h4>
      <p style="margin-bottom: 12px;">A scheduled job fetches each configured source page once a day. Page HTML is passed to an LLM that extracts structured event records: title, organiser, dates, location, format, topics, cost, registration URL. Records are deduplicated and written to a database. This dashboard reads from that database.</p>

      <h4 style="font-family: Georgia, serif; font-size: 14px; color: var(--ink); margin: 20px 0 8px;">Coverage</h4>
      <p style="margin-bottom: 12px;">Currently 12 sources spanning commercial conference organisers (GIR, ACAMS, C5, ACI), regulators (RUSI), academic institutions (Cambridge CIDOEC), professional bodies (LCIA, ICC), and law firm events (HSF, Gibson Dunn). New sources can be added by editing the configuration — the LLM handles page parsing without bespoke code per source.</p>

      <h4 style="font-family: Georgia, serif; font-size: 14px; color: var(--ink); margin: 20px 0 8px;">Data quality</h4>
      <p style="margin-bottom: 12px;">The extractor returns a confidence score for each event. Records below 0.5 are flagged for manual review. Events past their end date are hidden from default views. Every registration URL is retained as source-of-truth — if the data shown here is wrong, the organiser's page is authoritative.</p>
    </div>`;
}

/* ============================================================
   RENDER: MAIN
   ============================================================ */
function render() {
  renderKPIs();
  renderChips();
  renderSide();

  // Hide/show side panel depending on page
  const side = document.querySelector(".side");
  const filters = document.querySelector(".filters");
  const viewToggle = $("#view-toggle");

  if (state.page === "events" || state.page === "calendar") {
    const list = applyFilters(EVENTS);
    $("#result-count").textContent = `Showing ${list.length} of ${EVENTS.filter(e => parseDate(e.end) >= TODAY).length}`;
    filters.style.display = "";
    side.style.display = "";
    viewToggle.style.display = "";

    if (state.view === "calendar" || state.page === "calendar") {
      $("#content-title").textContent = "Calendar view";
      $("#page-title").textContent = "Calendar";
      $("#page-sub").textContent = "All upcoming events plotted by date.";
      renderCalendar(list);
    } else {
      $("#content-title").textContent = "Upcoming events";
      $("#page-title").textContent = "Upcoming events";
      $("#page-sub").textContent = "Real events from 12 sources. Click any event to view full details.";
      renderList(list);
    }
  } else if (state.page === "sources") {
    filters.style.display = "none";
    side.style.display = "none";
    viewToggle.style.display = "none";
    $("#content-title").textContent = "Data sources";
    $("#page-title").textContent = "Data sources";
    $("#page-sub").textContent = "Where the data comes from and how often it refreshes.";
    renderSources();
  } else if (state.page === "about") {
    filters.style.display = "none";
    side.style.display = "none";
    viewToggle.style.display = "none";
    $("#content-title").textContent = "About";
    $("#page-title").textContent = "About";
    $("#page-sub").textContent = "What this is and how it works.";
    renderAbout();
  }
}

/* ============================================================
   MODAL
   ============================================================ */
function openModal(id) {
  const e = EVENTS.find(x => x.id === id);
  if (!e) return;
  const d = fmtDate(e.start);
  const endD = fmtDate(e.end);
  const dateStr = e.start === e.end ? d.full : `${d.full} — ${endD.full}`;
  const daysAway = daysFromToday(e.start);

  $("#m-org").textContent = e.organiser;
  $("#m-title").textContent = e.title;

  const formatCls = e.format === "Virtual" ? "format-v" : e.format === "In-person" ? "format-i" : "format-h";
  const costCls = e.cost === "Free" ? "cost-f" : "cost-p";
  $("#m-tags").innerHTML = [
    `<span class="tag ${formatCls}">${e.format}</span>`,
    `<span class="tag ${costCls}">${e.cost}</span>`,
    ...e.topics.map(t => `<span class="tag topic">${t}</span>`),
    ...e.flags.map(f => `<span class="tag flag">${f}</span>`)
  ].join("");

  $("#m-grid").innerHTML = `
    <dt>When</dt><dd>${dateStr} <span style="color: var(--ink-mute);">· ${daysAwayLabel(daysAway)}</span></dd>
    <dt>Where</dt><dd>${e.city}${e.country ? ", " + e.country : ""}</dd>
    <dt>Format</dt><dd>${e.format}</dd>
    <dt>Audience</dt><dd>${e.audience || "—"}</dd>
    <dt>Cost</dt><dd>${e.costDisplay}</dd>
    <dt>Topics</dt><dd>${e.topics.join(", ")}</dd>
    <dt>Summary</dt><dd style="line-height: 1.5;">${e.summary}</dd>
    <dt>Source</dt><dd><a href="${e.url}" target="_blank" rel="noopener">${e.url}</a></dd>
  `;

  $("#m-meta").textContent = `ID: ${e.id}`;
  $("#m-register").href = e.url;
  $("#m-ics").onclick = () => downloadICS(e);

  $("#modal").classList.add("open");
}
function closeModal() { $("#modal").classList.remove("open"); }

/* ============================================================
   ICS CALENDAR EXPORT
   ============================================================ */
function downloadICS(e) {
  const dt = (iso) => iso.replace(/-/g, "");
  const end = parseDate(e.end);
  end.setDate(end.getDate() + 1); // ICS DTEND is exclusive
  const endIso = end.toISOString().slice(0,10);
  const ics = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//Events Radar//EN",
    "BEGIN:VEVENT",
    `UID:${e.id}@events-radar`,
    `DTSTAMP:${new Date().toISOString().replace(/[-:]/g,"").slice(0,15)}Z`,
    `DTSTART;VALUE=DATE:${dt(e.start)}`,
    `DTEND;VALUE=DATE:${dt(endIso)}`,
    `SUMMARY:${e.title}`,
    `LOCATION:${e.city}${e.country ? ", " + e.country : ""}`,
    `DESCRIPTION:${e.summary}\\n\\nOrganiser: ${e.organiser}\\nRegister: ${e.url}`,
    `URL:${e.url}`,
    "END:VEVENT",
    "END:VCALENDAR"
  ].join("\r\n");
  const blob = new Blob([ics], { type: "text/calendar" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${e.id}.ics`;
  a.click();
  URL.revokeObjectURL(url);
  toast("Calendar file downloaded");
}

/* ============================================================
   CSV EXPORT
   ============================================================ */
function exportCSV() {
  const list = applyFilters(EVENTS);
  const cols = ["id","title","organiser","start","end","city","country","region","format","cost","costDisplay","audience","topics","flags","url"];
  const rows = [cols.join(",")];
  list.forEach(e => {
    rows.push(cols.map(c => {
      let v = e[c];
      if (Array.isArray(v)) v = v.join("; ");
      v = String(v || "").replace(/"/g, '""');
      if (v.includes(",") || v.includes('"') || v.includes("\n")) v = `"${v}"`;
      return v;
    }).join(","));
  });
  const blob = new Blob([rows.join("\n")], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `events-radar-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`Exported ${list.length} events`);
}

/* ============================================================
   EVENT HANDLERS
   ============================================================ */
// Top nav
$$(".nav-tab").forEach(tab => tab.addEventListener("click", () => {
  $$(".nav-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  state.page = tab.dataset.page;
  if (state.page === "calendar") state.view = "calendar";
  else if (state.page === "events") state.view = "list";
  // Sync view-toggle
  $$("#view-toggle button").forEach(b => b.classList.toggle("active", b.dataset.view === state.view));
  render();
}));

// View toggle
$("#view-toggle").addEventListener("click", ev => {
  const btn = ev.target.closest("button");
  if (!btn) return;
  state.view = btn.dataset.view;
  $$("#view-toggle button").forEach(b => b.classList.toggle("active", b === btn));
  // If we're on events/calendar tab, update accordingly
  if (state.page !== "events" && state.page !== "calendar") {
    state.page = state.view === "calendar" ? "calendar" : "events";
    $$(".nav-tab").forEach(t => t.classList.toggle("active", t.dataset.page === state.page));
  }
  render();
});

// Filters (delegated)
document.querySelectorAll(".chips").forEach(container => {
  const group = container.dataset.group;
  container.addEventListener("click", ev => {
    const chip = ev.target.closest(".chip");
    if (!chip) return;
    const val = chip.dataset.val;
    if (state[group].has(val)) state[group].delete(val);
    else state[group].add(val);
    render();
  });
});

// Clear buttons
$$("[data-clear]").forEach(btn => btn.addEventListener("click", () => {
  const g = btn.dataset.clear;
  if (g === "dates") {
    state.dateFrom = ""; state.dateTo = "";
    $("#date-from").value = ""; $("#date-to").value = "";
  } else {
    state[g] = new Set();
  }
  render();
}));

// Search
let searchTimer;
$("#search").addEventListener("input", e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.search = e.target.value; render(); }, 150);
});

// Date range
$("#date-from").addEventListener("change", e => { state.dateFrom = e.target.value; render(); });
$("#date-to").addEventListener("change", e => { state.dateTo = e.target.value; render(); });

// Sort
$("#sort").addEventListener("change", e => { state.sort = e.target.value; render(); });

// Event clicks (delegated — works for both list and calendar views)
document.addEventListener("click", ev => {
  const evBtn = ev.target.closest(".event");
  if (evBtn) { openModal(evBtn.dataset.id); return; }
  const calEv = ev.target.closest(".cal-event");
  if (calEv) { openModal(calEv.dataset.id); return; }
  // Side-panel topic click filters by that topic
  const topicBar = ev.target.closest("[data-topic]");
  if (topicBar) {
    const t = topicBar.dataset.topic;
    state.topic.has(t) ? state.topic.delete(t) : state.topic.add(t);
    render();
  }
});

// Modal
$("#modal-close").addEventListener("click", closeModal);
$("#modal").addEventListener("click", ev => { if (ev.target.id === "modal") closeModal(); });
document.addEventListener("keydown", ev => {
  if (ev.key === "Escape") closeModal();
  // Keyboard: "/" focuses search
  if (ev.key === "/" && document.activeElement.tagName !== "INPUT") {
    ev.preventDefault();
    $("#search").focus();
  }
});

// Buttons
$("#export-btn").addEventListener("click", exportCSV);
$("#subscribe-btn").addEventListener("click", () => {
  toast("Weekly digest: sign-up goes here");
});
$("#submit-event").addEventListener("click", ev => { ev.preventDefault(); toast("Submit form goes here"); });
$("#report-issue").addEventListener("click", ev => { ev.preventDefault(); toast("Report form goes here"); });
$("#view-api").addEventListener("click", ev => { ev.preventDefault(); toast("API docs go here"); });

/* ============================================================
   DATA LOADING + INIT
   ============================================================ */
async function loadData() {
  try {
    // Cache-bust by appending the current date so browsers don't serve stale
    const bust = new Date().toISOString().slice(0,10);
    const res = await fetch(`events.json?v=${bust}`, { cache: "no-cache" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const payload = await res.json();
    EVENTS = payload.events || [];
    // Update refresh indicator with real generated_at time
    if (payload.generated_at) {
      const d = new Date(payload.generated_at);
      const rel = relativeTime(d);
      $("#refresh-time").textContent = `Live · updated ${rel}`;
    } else {
      $("#refresh-time").textContent = `Live · ${EVENTS.length} events`;
    }
  } catch (err) {
    console.error("Failed to load events.json:", err);
    $("#refresh-time").textContent = "⚠ Data load failed";
    showLoadError(err.message);
    return;
  }
  render();
}

function relativeTime(d) {
  const secs = Math.round((Date.now() - d.getTime()) / 1000);
  if (secs < 60) return "just now";
  const mins = Math.round(secs / 60);
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.round(mins / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.round(hours / 24);
  if (days === 1) return "yesterday";
  return `${days}d ago`;
}

function showLoadError(msg) {
  $("#view-container").innerHTML = `
    <div class="empty">
      <strong>Couldn't load event data</strong>
      ${msg}. The page will auto-retry in 30 seconds.
    </div>`;
  setTimeout(loadData, 30000);
}

loadData();
</script>
